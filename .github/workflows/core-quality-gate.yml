name: core-quality-gate

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build

      - name: Run core quality gate
        run: ctest --test-dir build --output-on-failure -R '^engine_core\.'
